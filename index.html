<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lovely Website ❤️</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div id="loader">
    <div class="loader-heart">❤️</div>
    <h2>Loading Magic...</h2>
</div>
    
<div class="sky">

    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>

    <div class="moon"></div>

    <div id="stars"></div>

</div>

<div class="hearts"></div>

<section class="hero" id="hero">

<div id="catMascot">
    🐱
</div>

<h1>Hello Beautiful ❤️</h1>

<p>
Welcome to a magical little world made with love.
</p>

<button id="startBtn">
Start Journey ✨
</button>

</section>

<section class="scene2 hidden" id="scene2">

<h2 id="typing"></h2>

<p id="subtitle"></p>

<button id="continueBtn" class="hidden">
    Continue ❤️
</button>

</section>

<section class="proposal hidden" id="proposal">

    <h1>Will You Be My Favorite Person? ❤️</h1>

    <p>
        Every beautiful story starts with one little "Yes".
    </p>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 🙈</button>
    </div>

</section>

<script src="script.js"></script>

</body>
</html>
